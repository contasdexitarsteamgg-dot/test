<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercari Sniper — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f13; color: #e0e0e0;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .card {
    background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 16px;
    padding: 48px 40px; width: 360px; text-align: center;
  }
  .logo { font-size: 2.5rem; margin-bottom: 12px; }
  h1 { font-size: 1.4rem; color: #fff; margin-bottom: 4px; }
  p  { font-size: 0.85rem; color: #555; margin-bottom: 32px; }
  input {
    width: 100%; padding: 12px 16px; background: #0f0f13;
    border: 1px solid #2a2a3a; border-radius: 8px;
    color: #e0e0e0; font-size: 1rem; margin-bottom: 14px;
    outline: none; transition: border-color .2s;
  }
  input:focus { border-color: #6c63ff; }
  button {
    width: 100%; padding: 12px; background: #6c63ff; border: none;
    border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  button:hover { background: #574fd6; }
  .error {
    background: #2a1010; border: 1px solid #ff4444; border-radius: 8px;
    padding: 10px; color: #ff7070; font-size: 0.85rem; margin-bottom: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎯</div>
  <h1>Mercari Sniper</h1>
  <p>Enter your dashboard password</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">Enter</button>
  </form>
</div>
</body>
</html>
